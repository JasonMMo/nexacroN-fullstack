# HSQLDB in-memory datasource
datasource.url=jdbc:hsqldb:mem:nexacro;sql.syntax_mys=true
datasource.driver-class-name=org.hsqldb.jdbc.JDBCDriver
datasource.username=sa
datasource.password=

# Nexacro file storage
nexacro.file.storage-dir=./uploads

# Relay disabled by default (empty url = 503 fallback)
nexacro.relay.exim.url=
nexacro.relay.exim.connect-timeout=5000
nexacro.relay.exim.read-timeout=30000

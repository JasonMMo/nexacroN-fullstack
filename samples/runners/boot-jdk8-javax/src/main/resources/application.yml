server:
  port: 8080
  servlet:
    context-path: /uiadapter

spring:
  datasource:
    url: jdbc:hsqldb:mem:nexacro;sql.syntax_mys=true
    driver-class-name: org.hsqldb.jdbc.JDBCDriver
    username: sa
    password: ""
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql
      separator: "^^"
      continue-on-error: false
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

mybatis:
  config-location: classpath:mybatis/sql-mapper-config.xml
  mapper-locations: classpath:mybatis/mappers/*-mapper.xml
  type-aliases-package: com.nexacro.uiadapter.domain

nexacro:
  file:
    storage-dir: ./uploads
  relay:
    exim:
      url:                  # empty by default — 503 fallback when not configured
      connect-timeout: 5000
      read-timeout: 30000
      forward-headers: {}

logging:
  level:
    root: INFO
    com.nexacro.uiadapter: DEBUG
    org.springframework.jdbc: INFO
    org.mybatis: INFO

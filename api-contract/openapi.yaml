openapi: 3.0.3
info:
  title: nexacroN-fullstack API contract
  version: 0.1.0
  description: |
    14 canonical endpoints per .claude/rules/nexacro-fullstack-purpose.md §2.
    All paths use /uiadapter prefix. The contract is framework-neutral —
    servlet (javax / jakarta) and reactive (webflux) runners must all satisfy it.

    Request/response bodies follow the nexacro-data-format spec
    (XML / SSV / JSON — see data-formats.md). Defaults to JSON here for tooling;
    actual runtime content-type is chosen by `packageN.xadl` and the `xapi` layer.

servers:
  - url: http://localhost:8080/uiadapter
    description: Local dev (default svcurl in packageN.xadl)

tags:
  - name: auth
    description: Login / logout
  - name: data
    description: Single / list / update / large data / wide columns
  - name: file
    description: Upload / download / multi-part
  - name: stream
    description: Video streaming
  - name: integration
    description: External system integration (relay)

paths:

  # ============== 14 Canonical Endpoints per §2 ==============

  # ---- 1-2: Auth (2) ----
  /uiadapter/login.do:
    post:
      operationId: loginDo
      tags: [auth]
      summary: 로그인
      requestBody:
        $ref: '#/components/requestBodies/NexacroDatasetIn'
      responses:
        '200':
          $ref: '#/components/responses/NexacroDatasetOut'

  /uiadapter/logout.do:
    post:
      operationId: logoutDo
      tags: [auth]
      summary: 로그아웃
      requestBody:
        $ref: '#/components/requestBodies/NexacroDatasetIn'
      responses:
        '200':
          $ref: '#/components/responses/NexacroDatasetOut'

  # ---- 3-6: Data (4) ----
  /uiadapter/select_data_single.do:
    post:
      operationId: selectDataSingleDo
      tags: [data]
      summary: 단건 select
      requestBody:
        $ref: '#/components/requestBodies/NexacroDatasetIn'
      responses:
        '200':
          $ref: '#/components/responses/NexacroDatasetOut'

  /uiadapter/select_datalist.do:
    post:
      operationId: selectDatalistDo
      tags: [data]
      summary: 리스트 select
      requestBody:
        $ref: '#/components/requestBodies/NexacroDatasetIn'
      responses:
        '200':
          $ref: '#/components/responses/NexacroDatasetOut'

  /uiadapter/update_datalist_map.do:
    post:
      operationId: updateDatalistMapDo
      tags: [data]
      summary: 리스트 insert/update/delete
      requestBody:
        $ref: '#/components/requestBodies/NexacroDatasetIn'
      responses:
        '200':
          $ref: '#/components/responses/NexacroDatasetOut'

  /uiadapter/update_deptlist_map.do:
    post:
      operationId: updateDeptlistMapDo
      tags: [data]
      summary: 부서 트리 갱신
      requestBody:
        $ref: '#/components/requestBodies/NexacroDatasetIn'
      responses:
        '200':
          $ref: '#/components/responses/NexacroDatasetOut'

  # ---- 7-9: File (3) ----
  /uiadapter/advancedUploadFiles.do:
    post:
      operationId: advancedUploadFilesDo
      tags: [file]
      summary: 다중 업로드
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                files:
                  type: array
                  items:
                    type: string
                    format: binary
      responses:
        '200':
          $ref: '#/components/responses/NexacroDatasetOut'

  /uiadapter/advancedDownloadFile.do:
    get:
      operationId: advancedDownloadFileDo
      tags: [file]
      summary: 단일 다운로드 (web download — Content-Disposition + Range)
      parameters:
        - in: query
          name: fileId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Binary content
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary

  /uiadapter/advancedDownloadList.do:
    get:
      operationId: advancedDownloadListDo
      tags: [file]
      summary: 다운로드 리스트 (web download — ZIP stream)
      parameters:
        - in: query
          name: ids
          required: true
          schema: { type: string, description: "Comma-separated file IDs" }
      responses:
        '200':
          description: ZIP archive stream
          content:
            application/zip:
              schema:
                type: string
                format: binary

  # ---- 10-13: Data (continued: large, video, test, wide) ----
  /uiadapter/sampleLargeData.do:
    post:
      operationId: sampleLargeDataDo
      tags: [data]
      summary: 대용량 select
      requestBody:
        $ref: '#/components/requestBodies/NexacroDatasetIn'
      responses:
        '200':
          $ref: '#/components/responses/NexacroDatasetOut'

  /uiadapter/sampleVideoStream.do:
    get:
      operationId: sampleVideoStreamDo
      tags: [stream]
      summary: 비디오 스트리밍 (HTTP Range partial content)
      parameters:
        - in: query
          name: name
          required: false
          schema: { type: string }
        - in: header
          name: Range
          required: false
          schema: { type: string, example: "bytes=0-" }
      responses:
        '200':
          description: Full video stream
          content:
            video/mp4:
              schema:
                type: string
                format: binary
        '206':
          description: Partial content (Range request)
          content:
            video/mp4:
              schema:
                type: string
                format: binary

  /uiadapter/sampleTestData.do:
    post:
      operationId: sampleTestDataDo
      tags: [data]
      summary: 테스트 데이터
      requestBody:
        $ref: '#/components/requestBodies/NexacroDatasetIn'
      responses:
        '200':
          $ref: '#/components/responses/NexacroDatasetOut'

  /uiadapter/sampleWideColumns.do:
    post:
      operationId: sampleWideColumnsDo
      tags: [data]
      summary: 와이드 컬럼
      requestBody:
        $ref: '#/components/requestBodies/NexacroDatasetIn'
      responses:
        '200':
          $ref: '#/components/responses/NexacroDatasetOut'

  # ---- 14: Integration (1) ----
  /uiadapter/relay/exim_exchange.do:
    post:
      operationId: relayEximExchangeDo
      tags: [integration]
      summary: 외부 시스템 릴레이
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
      responses:
        '200':
          description: Exchange result
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary

  # ============== Runner Extras (rules §8) ==============
  # 스펙 외 — 테스트 목적으로 양 lane 공통 보유
  /uiadapter/check_testDataTypeList.do:
    post:
      operationId: checkTestDataTypeListDo
      tags: [data]
      summary: 테스트 데이터 타입 검증 (예외케이스 테스트용)
      description: Runner extra per rules §8. Not part of canonical 14-endpoint contract.
      requestBody:
        $ref: '#/components/requestBodies/NexacroDatasetIn'
      responses:
        '200':
          $ref: '#/components/responses/NexacroDatasetOut'

components:
  requestBodies:
    NexacroDatasetIn:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/NexacroDatasetEnvelope'
        application/xml:
          schema:
            $ref: '#/components/schemas/NexacroDatasetEnvelope'
        text/plain:
          schema:
            type: string
            description: SSV format (see data-formats.md)

  responses:
    NexacroDatasetOut:
      description: Nexacro envelope response (JSON / XML / SSV)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/NexacroDatasetEnvelope'
        application/xml:
          schema:
            $ref: '#/components/schemas/NexacroDatasetEnvelope'
        text/plain:
          schema:
            type: string

  schemas:
    LoginResponse:
      type: object
      properties:
        status: { type: string, example: LOGIN_SUCCESS }
        userId: { type: string }

    NexacroDatasetEnvelope:
      type: object
      description: |
        Root envelope. See data-formats.md for XML / SSV / JSON encoding details
        and _RowType_ (N / I / U / D / O) semantics.
      properties:
        version: { type: string, example: "1.0" }
        Parameters:
          type: array
          items:
            type: object
            properties:
              id: { type: string }
              value: { type: string }
              type: { type: string }
        Datasets:
          type: array
          items:
            type: object
            properties:
              id: { type: string }
              ColumnInfo:
                type: object
                properties:
                  ConstColumn:
                    type: array
                    items: { type: object }
                  Column:
                    type: array
                    items: { type: object }
              Rows:
                type: array
                items:
                  type: object
                  properties:
                    _RowType_:
                      type: string
                      enum: [N, I, U, D, O]
